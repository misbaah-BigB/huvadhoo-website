<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Huvadhoo Maldives Travel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sand:#F5EEDF;
    --ink:#0B2A2E;
    --teal:#1F7A6C;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    background:var(--sand);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    text-align:center;
    padding:24px;
  }
  .admin-box{max-width:440px;}
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(24px,4vw,32px);
    margin:0 0 12px;
  }
  p.lede{
    margin:0 0 28px;
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:clamp(18px,2.6vw,22px);
    color:var(--teal);
  }
  .logout-link{
    font-family:'Inter', sans-serif;
    font-size:14px;
    font-weight:600;
    color:var(--ink);
    opacity:.7;
    text-decoration:underline;
  }
  .logout-link:hover{opacity:1;}
</style>
</head>
<body>

<div class="admin-box">
  <h1>Huvadhoo Admin</h1>
  <p class="lede">Login successful — welcome to the Huvadhoo Admin Dashboard</p>
  <a class="logout-link" href="/logout">Log out</a>
</div>

</body>
</html>
